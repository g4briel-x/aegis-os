name: Aegis OS Python Runtime Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-tests:
    name: Test Python runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: runtime/pyproject.toml

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./runtime[dev]"

      - name: Run runtime tests
        run: python -m pytest tests/runtime

      - name: Run CLI regression checks
        run: |
          aegis-runtime --repo-root . registry domains
          aegis-runtime --repo-root . registry tags
          aegis-runtime --repo-root . asset show security.review-api-security
          aegis-runtime --repo-root . validate
