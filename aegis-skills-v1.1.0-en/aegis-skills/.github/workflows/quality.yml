name: quality

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: pytest
      - run: python -m aegis_skills validate --root . --strict
      - run: python -m aegis_skills build --root . --clean
      - run: python -m aegis_skills validate --root . --strict --check-dist
