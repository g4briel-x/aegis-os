aegis:
  name: Aegis OS
  version: 0.7.0
  environment: development

paths:
  root: .
  core: core
  shared: shared
  docs: docs
  skills: skills
  playbooks: playbooks
  patterns: patterns
  templates: templates
  registry: registry
  scripts: scripts
  reports: reports
  cli: cli

registry:
  skills: registry/skills/skills.registry.yaml
  playbooks: registry/playbooks/playbooks.registry.yaml
  patterns: registry/patterns/patterns.registry.yaml
  templates: registry/templates/templates.registry.yaml
  docs: registry/docs/docs.registry.yaml
  domains: registry/domains/domains.registry.yaml
  tags: registry/tags/tags.registry.yaml
  releases: registry/releases/releases.registry.yaml

validation:
  entrypoint: python -m aegis_runtime --repo-root . validate --strict-related
  strict_paths: true
  strict_ids: true
  strict_related_assets: true

reports:
  output_dir: reports/registry
  registry_summary: reports/registry/REGISTRY_SUMMARY.md
  asset_map: reports/registry/ASSET_MAP.md
  domain_report: reports/registry/DOMAIN_REPORT.md
  release_report: reports/registry/RELEASE_REPORT.md

cli:
  entrypoint: aegis
  default_output: text
  allow_open_file_explorer: true
