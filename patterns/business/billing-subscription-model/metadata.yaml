pattern:
  id: business.billing-subscription-model
  name: Billing Subscription Model
  version: 0.1.0
  status: draft
  domain: business
  category: saas-monetization
  maturity: usable
  owner: aegis-os
  description: Reusable pattern for SaaS plans, subscriptions, prices, entitlements, trials, invoices, upgrades, downgrades and payment failure handling.
  problem: SaaS billing becomes fragile when pricing, subscription states, product access and customer lifecycle rules are not modeled explicitly.
  context:
    - SaaS subscriptions
    - pricing tiers
    - free trials
    - paid pilots
    - feature entitlements
    - billing admins
    - invoice lifecycle
    - payment provider integration
  recommended_when:
    - product needs recurring revenue
    - plan-based access exists
    - subscription states affect product behavior
    - upgrades and downgrades must be defined
    - billing data must be auditable
  avoid_when:
    - product is pure discovery
    - billing is intentionally manual
    - pricing is not validated
    - enterprise contracts are fully custom
  outputs:
    - billing_model
    - subscription_state_model
    - plan_catalog
    - entitlement_matrix
    - upgrade_downgrade_rules
    - payment_failure_policy
    - billing_test_cases
  related_skills:
    - product.product-manager-saas
    - product.business-analyst
    - engineering.software-architect
    - engineering.database-engineer
    - security.security-engineer
  related_playbooks:
    - product.define-pricing-strategy
    - product.define-saas-mvp
    - product.create-prd
    - business.create-go-to-market-plan
    - security.design-auth-rbac
    - engineering.design-saas-data-model
  related_patterns:
    - product.saas-mvp-scope
    - security.rbac-permission-model
    - security.audit-logging-traceability
    - engineering.database-migration-safety
  tags:
    - billing
    - subscriptions
    - pricing
    - saas
    - monetization
    - entitlements
    - invoices
