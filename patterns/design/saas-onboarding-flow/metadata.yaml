    - product.create-prd
    - product.prepare-saas-launch
    - business.create-go-to-market-plan
  related_patterns:
    - product.saas-mvp-scope
    - operations.feature-flag-rollout
    - operations.production-observability-baseline
  tags:
    - onboarding
    - ux
