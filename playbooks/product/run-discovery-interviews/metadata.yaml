  status: premium-draft
  domain: product
  category: product-discovery
  maturity: usable
  owner: aegis-os
  description: Structured procedure for preparing, conducting and synthesizing customer discovery interviews.
  trigger: A product idea, market segment or feature needs qualitative validation.
  inputs:
    - product_idea
    - target_customer_hypothesis
    - problem_hypothesis
    - business_objective
